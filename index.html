<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森林打地鼠 - 舒壓小遊戲</title>
    <style>
        :root {
            --mint-green: #e0f2f1;
            --dark-mint: #80cbc4;
            --brown: #6d4c41;
            --earth-brown: #a1887f;
            --mole-color: #795548;
            --accent-red: #ff8a80;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--mint-green);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--brown);
        }

        h1 {
            margin-bottom: 10px;
            color: var(--brown);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 遊戲網格 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 20px;
            background-color: var(--dark-mint);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* 地洞 */
        .hole {
            width: 100px;
            height: 100px;
            background-color: var(--brown);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 4px solid var(--earth-brown);
            box-shadow: inset 0 10px 0 rgba(0,0,0,0.2);
        }

        /* 地鼠 */
        .mole {
            width: 80px;
            height: 80px;
            background-color: var(--mole-color);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            left: 10px;
            top: 100%; /* 初始藏在洞下 */
            transition: top 0.2s ease-out;
            cursor: pointer;
        }

        /* 地鼠的臉部裝飾 */
        .mole::before {
            content: "👀";
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 20px;
        }
        .mole::after {
            content: "👃";
            position: absolute;
            top: 35px;
            left: 28px;
            font-size: 12px;
        }

        /* 地鼠升起的狀態 */
        .mole.up {
            top: 15%;
        }

        /* 按鈕 */
        button {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 1rem;
            background-color: var(--brown);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 0 #3e2723;
        }

        button:hover {
            background-color: #5d4037;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #3e2723;
        }

        button:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>森林打地鼠</h1>

    <div class="stats">
        <div>得分: <span id="score">0</span></div>
        <div>剩餘時間: <span id="time">30</span>s</div>
    </div>

    <div class="game-board">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>

    <button id="start-btn">開始遊戲</button>

    <script>
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let timeLeft = 30;
        let lastHole;
        let gameActive = false;
        let timerId;
        let moleTimeoutId;

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            if (!gameActive) return;
            
            const time = randomTime(600, 1200); // 地鼠停留的時間
            const hole = randomHole(holes);
            const mole = hole.querySelector('.mole');
            
            mole.classList.add('up');

            moleTimeoutId = setTimeout(() => {
                mole.classList.remove('up');
                if (gameActive) peep();
            }, time);
        }

        function startGame() {
            // 重置狀態
            score = 0;
            timeLeft = 30;
            gameActive = true;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            startBtn.disabled = true;

            peep();

            // 倒數計時器
            timerId = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerId);
            clearTimeout(moleTimeoutId);
            moles.forEach(m => m.classList.remove('up'));
            startBtn.disabled = false;
            alert(`遊戲結束！你的得分是：${score}`);
        }

        function whack(e) {
            if (!e.isTrusted) return; // 防止作弊程式觸發點擊
            if (!this.classList.contains('up')) return; // 沒冒出來點不到

            score++;
            this.classList.remove('up'); // 點到就縮回去
            scoreDisplay.textContent = score;
        }

        moles.forEach(mole => mole.addEventListener('click', whack));
        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>

</body>

</html>
